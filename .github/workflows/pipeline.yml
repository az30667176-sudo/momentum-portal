name: Daily Data Pipeline

on:
  schedule:
    # 夏令（PDT, UTC-7，3月–11月）：20:30 UTC = 1:30 PM PT，收盤後 30 分鐘
    - cron: '30 20 * * 1-5'
    # 冬令（PST, UTC-8，11月–3月）：21:30 UTC = 1:30 PM PT，收盤後 30 分鐘
    - cron: '30 21 * * 1-5'

  workflow_dispatch:
    inputs:
      force_rerun:
        description: '強制重跑今天的資料（即使已存在）'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      backfill:
        description: '回填模式（首次執行用）'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      backfill_years:
        description: '回填年數（backfill=true 時有效，預設 1 年，填 3 = 三年歷史）'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3']
      backfill_part:
        description: '分批執行（0=全部, 1=舊半部先跑, 2=新半部後跑）'
        required: false
        default: '0'
        type: choice
        options: ['0', '1', '2']

jobs:
  run-pipeline:
    name: Run Momentum Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (normal mode)
        if: ${{ github.event.inputs.backfill != 'true' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FORCE_RERUN:          ${{ github.event.inputs.force_rerun || 'false' }}
        run: python pipeline/main.py

      - name: Run pipeline (backfill mode)
        if: ${{ github.event.inputs.backfill == 'true' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pipeline/main.py --backfill --years ${{ github.event.inputs.backfill_years || '1' }} --part ${{ github.event.inputs.backfill_part || '0' }}

      - name: Commit updated price cache
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.parquet
          # 只有快取有變動時才 commit（避免空 commit）
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
          else
            git commit -m "chore: update price cache $(date -u '+%Y-%m-%d') [skip ci]"
            git push
            echo "Price cache committed and pushed."
          fi

      - name: Write success summary
        if: success()
        run: |
          echo "## Pipeline Success" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Completed successfully" >> $GITHUB_STEP_SUMMARY

      - name: Write failure summary
        if: failure()
        run: |
          echo "## Pipeline FAILED" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Check logs above for details" >> $GITHUB_STEP_SUMMARY
